x-citus-common: &citus-common
  image: citusdata/citus:12.1.6
  restart: always
  environment:
    POSTGRES_USER: postgres
    POSTGRES_DB: app_db
    POSTGRES_PASSWORD: app_pswd
    PGUSER: postgres
    PGPASSWORD: app_pswd
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 5s
    timeout: 5s
    retries: 5

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: always
    environment:
      ALLOW_ORIGINS: "http://localhost:3030,http://0.0.0.0:3030"
      DB_MASTER_HOST: master
    ports:
      - "8000:8000"
    env_file:
      - dev.env
    command: ["start", "8000"]
    depends_on:
      - valkey
      - master

  master:
    <<: *citus-common
    container_name: master_db
    ports:
      - "5432:5432"
    volumes:
      - citus_master_data:/var/lib/postgresql/data

  worker:
    <<: *citus-common

  citus-init:
    image: citusdata/citus:12.1.6
    restart: "no"
    depends_on:
      master:
        condition: service_healthy
      worker:
        condition: service_healthy
    environment:
      PGPASSWORD: app_pswd
      WORKERS: ${WORKERS:-3}
      PROJECT_NAME: ${PROJECT_NAME:-dialogs}
    command:
      - /bin/bash
      - -ec
      - |
        set -e
        echo "Init coordinator"
        psql -h master -U postgres -d app_db -c "SELECT citus_set_coordinator_host('master_db', 5432);"
        for i in $$(seq 1 $$WORKERS); do
          host="$${PROJECT_NAME}-worker-$$i"
          attempts=0
          max_attempts=60
          echo "Waiting for worker $$i ($$host)"
          while [ $$attempts -lt $$max_attempts ]; do
            if pg_isready -h "$$host" -U postgres -p 5432 >/dev/null 2>&1; then
              break
            fi
            attempts=$$((attempts + 1))
            sleep 2
          done
          if ! pg_isready -h "$$host" -U postgres -p 5432 >/dev/null 2>&1; then
            echo "Could not resolve worker $$i: $$host"
            exit 1
          fi
          echo "Register $$host"
          node_exists=$$(psql -h master -U postgres -d app_db -tA -c "SELECT 1 FROM pg_dist_node WHERE nodename = '$$host' LIMIT 1;")
          if [ "$$node_exists" != "1" ]; then
            psql -h master -U postgres -d app_db -v ON_ERROR_STOP=1 -c "SELECT master_add_node('$$host', 5432);"
          fi
        done
        echo "Citus init done"

  valkey:
    image: dhi.io/valkey:9
    container_name: redis
    ports:
      - "6379:6379"
    command: ["valkey-server", "--protected-mode", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]

  kafka:
    image: dhi.io/kafka:4.1-native
    container_name: kafka
    ports:
      - "9092:9092"
    expose:
      - "9093"
    environment:
      KAFKA_ENABLE_KRAFT: yes
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9093,OUTSIDE://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9093,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka_data:/var/lib/kafka/data
      - /var/run/docker.sock:/var/run/docker.sock

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8082:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: true
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

volumes:
  kafka_data:
  citus_master_data:
