global
  daemon
  log stdout local0

defaults
  log global
  mode tcp
  option tcplog
  option dontlognull
  timeout connect 5000
  timeout client 50000
  timeout server 50000

listen stats
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 5s

listen postgres
  bind *:5432
  balance roundrobin
  option httpchk GET /master
  http-check expect status 200
  server patroni1 patroni1:5432 maxconn 100 check port 8008 inter 2000 rise 2 fall 5
  server patroni2 patroni2:5432 maxconn 100 check port 8008 inter 2000 rise 2 fall 5
  server patroni3 patroni3:5432 maxconn 100 check port 8008 inter 2000 rise 2 fall 5
