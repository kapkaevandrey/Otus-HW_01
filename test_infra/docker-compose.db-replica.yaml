services:
  app:
    container_name: app
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    restart: always
    environment:
      ALLOW_ORIGINS: "http://localhost:3030,http://0.0.0.0:3030,http://0.0.0.0:8000"
      DB_MASTER_HOST: master_pg
      DB_REPLICAS: "replica_pg_1:5432,replica_pg_2:5432"
    ports:
      - "8000:8000"
    env_file:
      - ../dev.env
    command:
      ["start", "8000"]
    depends_on:
      master_pg:
        condition: service_healthy
      replica_pg_1:
        condition: service_healthy
      replica_pg_2:
        condition: service_healthy
    networks:
      pgnet:

  master_pg:
    container_name: master_pg
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=app_db
      - POSTGRES_PASSWORD=app_pswd
    volumes:
      - ./volumes/pgmaster/:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pgnet:
        ipv4_address: 172.28.0.10

  replica_pg_1:
    container_name: replica_pg_1
    image: postgres:17
    restart: always
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_PASSWORD=app_pswd
    volumes:
      - ./volumes/replica_1/:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pgnet:
        ipv4_address: 172.28.0.11

  replica_pg_2:
    container_name: replica_pg_2
    image: postgres:17
    restart: always
    ports:
      - "25432:5432"
    environment:
      - POSTGRES_PASSWORD=app_pswd
    volumes:
      - ./volumes/replica_2/:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      pgnet:
        ipv4_address: 172.28.0.12

  k6:
    image: grafana/k6:latest
    container_name: k6
    ports:
      - "5665:5665"
    volumes:
      - ./scripts:/scripts
      - ./k6_reports:/reports
    environment:
      - K6_WEB_DASHBOARD=true
      - K6_WEB_DASHBOARD_EXPORT=/reports/html-report.html
    networks:
      pgnet:

networks:
  pgnet:
    name: pgnet
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
