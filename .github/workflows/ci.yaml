name: Linters and tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint_and_type:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ 3.14 ]
    steps:
      - name: Checkout repo
        uses: actions/checkout@master
      - name: Set up Python
        uses: actions/setup-python@master
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv package manager
        run: |
          python -m pip install --upgrade pip setuptools
          pip install uv
      - name: Install dependencies with uv
        run: |
          uv sync --frozen --group dev
      - name: Run Ruff linter
        run: |
          uv run ruff check .
      - name: Run mypy type checks
        run: |
          uv run mypy app

  tests:
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      DB_MASTER_HOST: "localhost"
      DB_DATABASE: "otus"
      DB_MASTER_USER: "otus"
      DB_MASTER_PASSWORD: "app_pswd"
      DB_MASTER_PORT: "5432"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: "app_pswd"
          POSTGRES_USER: "otus"
          POSTGRES_DB: "otus"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U otus -d otus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        python-version: [3.14]
    steps:
    - name: Checkout repo
      uses: actions/checkout@master
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv package manager
      run: |
        python -m pip install --upgrade pip setuptools
        pip install uv
    - name: Install dependencies with uv
      run: |
        uv sync --frozen --group dev
    - name: Run tests
      run: |
        uv run pytest --cov=app --cov-report=xml
    - name: Upload coverage report
      uses: actions/upload-artifact@master
      with:
        name: coverage-report
        path: coverage.xml

  docker_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@master
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master
      - name: Build Dev image
        run: |
          docker build \
            --target dev \
            --build-arg PYTHON_VERSION=3.14 \
            -t otus-social-network:dev .
      - name: Build Prod image
        run: |
          docker build \
            --target prod \
            --build-arg PYTHON_VERSION=3.14 \
            -t otus-social-network:prod .
      - name: Verify images
        run: |
          docker images | grep otus-social-network
