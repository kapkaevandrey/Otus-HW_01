version: "3"

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
        - ENVIRONMENT=dev
    restart: always
    environment:
      ALLOW_ORIGINS: "http://localhost:3030,http://0.0.0.0:3030"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - dev.env
    command:
      ["start", "8000"]
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: video_content_db
    image: postgres:13
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=app_db
      - POSTGRES_PASSWORD=app_pswd
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
